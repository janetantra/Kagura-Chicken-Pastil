<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .main-panel, .ai-panel {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .add-task-section {
            padding: 24px;
            border-bottom: 2px solid #f0f0f0;
        }

        .task-input-group {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-bottom: 12px;
        }

        input[type="text"], input[type="date"], select, textarea {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            grid-column: 1 / -1;
        }

        .task-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .filters {
            padding: 16px 24px;
            background: #f8f9fa;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 16px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .tasks-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .task-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .task-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
            flex: 1;
        }

        .task-description {
            color: #718096;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .task-meta-info {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-category {
            background: #e0e7ff;
            color: #4c51bf;
        }

        .badge-priority {
            background: #fed7d7;
            color: #c53030;
        }

        .badge-priority.medium {
            background: #feebc8;
            color: #c05621;
        }

        .badge-priority.low {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-status {
            background: #bee3f8;
            color: #2c5282;
        }

        .badge-status.in-progress {
            background: #fef5e7;
            color: #975a16;
        }

        .badge-status.completed {
            background: #c6f6d5;
            color: #22543d;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-actions button {
            padding: 6px 12px;
            font-size: 12px;
            background: #e0e0e0;
            color: #2d3748;
        }

        .task-actions button.delete {
            background: #fc8181;
            color: white;
        }

        .task-actions button.complete {
            background: #68d391;
            color: white;
        }

        .ai-header {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .ai-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .ai-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.user .message-avatar {
            background: #e0e0e0;
            color: #2d3748;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.ai .message-content {
            background: white;
            color: #2d3748;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-input-container {
            padding: 16px;
            background: white;
            border-top: 2px solid #e0e0e0;
        }

        .chat-input-group {
            display: flex;
            gap: 8px;
        }

        .chat-input-group input {
            flex: 1;
        }

        .chat-input-group button {
            padding: 12px 20px;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
                height: auto;
                min-height: calc(100vh - 40px);
            }

            .ai-panel {
                height: 500px;
            }
        }

        @media (max-width: 768px) {
            .task-meta {
                grid-template-columns: 1fr;
            }

            .task-input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Task Panel -->
        <div class="main-panel">
            <div class="header">
                <h1>🎯 AI Task Manager</h1>
                <p>Organize your life with intelligent assistance</p>
            </div>

            <div class="add-task-section">
                <div class="task-input-group">
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" />
                    <button onclick="addTask()">Add Task</button>
                </div>
                <textarea id="taskDescription" placeholder="Add description (optional)"></textarea>
                <div class="task-meta">
                    <select id="taskCategory">
                        <option value="daily">Daily Tasks</option>
                        <option value="weekly">Weekly Tasks</option>
                        <option value="monthly">Monthly Tasks</option>
                        <option value="urgent">Urgent</option>
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="projects">Projects</option>
                    </select>
                    <select id="taskPriority">
                        <option value="high">High Priority</option>
                        <option value="medium">Medium Priority</option>
                        <option value="low">Low Priority</option>
                    </select>
                    <input type="date" id="taskDueDate" />
                </div>
            </div>

            <div class="filters">
                <button class="filter-btn active" onclick="filterTasks('all')">All</button>
                <button class="filter-btn" onclick="filterTasks('daily')">Daily</button>
                <button class="filter-btn" onclick="filterTasks('weekly')">Weekly</button>
                <button class="filter-btn" onclick="filterTasks('monthly')">Monthly</button>
                <button class="filter-btn" onclick="filterTasks('urgent')">Urgent</button>
                <button class="filter-btn" onclick="filterTasks('work')">Work</button>
                <button class="filter-btn" onclick="filterTasks('personal')">Personal</button>
                <button class="filter-btn" onclick="filterTasks('projects')">Projects</button>
            </div>

            <div class="tasks-container" id="tasksContainer">
                <!-- Tasks will be rendered here -->
            </div>
        </div>

        <!-- AI Assistant Panel -->
        <div class="ai-panel">
            <div class="ai-header">
                <h2>🤖 AI Assistant</h2>
                <p>Ask me anything about your tasks</p>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="message ai">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        Hi! I'm your AI task assistant. I can help you prioritize tasks, analyze your workload, and give productivity suggestions. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="message-avatar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">AI</div>
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input-group">
                    <input type="text" id="chatInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMessage()" />
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Task Management
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const title = document.getElementById('taskTitle').value.trim();
            if (!title) {
                alert('Please enter a task title');
                return;
            }

            const task = {
                id: Date.now(),
                title: title,
                description: document.getElementById('taskDescription').value.trim(),
                category: document.getElementById('taskCategory').value,
                priority: document.getElementById('taskPriority').value,
                dueDate: document.getElementById('taskDueDate').value,
                status: 'todo',
                createdAt: new Date().toISOString()
            };

            tasks.push(task);
            saveTasks();
            renderTasks();

            // Clear inputs
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDescription').value = '';
            document.getElementById('taskDueDate').value = '';
        }

        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
            }
        }

        function toggleTaskStatus(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                if (task.status === 'todo') task.status = 'in-progress';
                else if (task.status === 'in-progress') task.status = 'completed';
                else task.status = 'todo';
                saveTasks();
                renderTasks();
            }
        }

        function filterTasks(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        function getCategoryLabel(category) {
            const labels = {
                daily: 'Daily Tasks',
                weekly: 'Weekly Tasks',
                monthly: 'Monthly Tasks',
                urgent: 'Urgent',
                work: 'Work',
                personal: 'Personal',
                projects: 'Projects'
            };
            return labels[category] || category;
        }

        function getStatusLabel(status) {
            const labels = {
                'todo': 'To Do',
                'in-progress': 'In Progress',
                'completed': 'Completed'
            };
            return labels[status] || status;
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const filteredTasks = currentFilter === 'all' 
                ? tasks 
                : tasks.filter(t => t.category === currentFilter);

            if (filteredTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        <h3>No tasks yet</h3>
                        <p>Add a task to get started!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredTasks.map(task => `
                <div class="task-card">
                    <div class="task-header">
                        <div class="task-title">${task.title}</div>
                    </div>
                    ${task.description ? `<div class="task-description">${task.description}</div>` : ''}
                    <div class="task-meta-info">
                        <span class="badge badge-category">${getCategoryLabel(task.category)}</span>
                        <span class="badge badge-priority ${task.priority}">${task.priority.charAt(0).toUpperCase() + task.priority.slice(1)}</span>
                        <span class="badge badge-status ${task.status}">${getStatusLabel(task.status)}</span>
                        ${task.dueDate ? `<span class="badge" style="background: #fef5e7; color: #975a16;">📅 ${new Date(task.dueDate).toLocaleDateString()}</span>` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="complete" onclick="toggleTaskStatus(${task.id})">
                            ${task.status === 'completed' ? 'Reopen' : task.status === 'in-progress' ? 'Complete' : 'Start'}
                        </button>
                        <button class="delete" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // AI Chat
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            // Add user message
            addChatMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            document.getElementById('typingIndicator').classList.add('active');

            // Get AI response
            const response = await getAIResponse(message);
            
            // Hide typing indicator
            document.getElementById('typingIndicator').classList.remove('active');
            
            // Add AI response
            addChatMessage(response, 'ai');
        }

        function addChatMessage(text, sender) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${sender === 'ai' ? 'AI' : 'You'}</div>
                <div class="message-content">${text}</div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function getAIResponse(userMessage) {
            const taskStats = getTaskStatistics();
            const context = `
Current task statistics:
- Total tasks: ${taskStats.total}
- Pending: ${taskStats.pending}
- In Progress: ${taskStats.inProgress}
- Completed: ${taskStats.completed}
- High Priority: ${taskStats.highPriority}
- Urgent Category: ${taskStats.urgent}
- Daily Tasks: ${taskStats.daily}
- Weekly Tasks: ${taskStats.weekly}
- Monthly Tasks: ${taskStats.monthly}

User message: ${userMessage}

You are an AI task management assistant. Analyze the user's tasks and provide helpful, actionable advice about productivity, prioritization, and task management. Be friendly, concise, and practical.
`;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        messages: [{
                            role: 'user',
                            content: context
                        }]
                    })
                });

                const data = await response.json();
                return data.content[0].text;
            } catch (error) {
                console.error('AI Error:', error);
                return "I'm having trouble connecting right now. But I can still help! Based on your tasks, try focusing on high-priority items first and breaking down large tasks into smaller steps.";
            }
        }

        function getTaskStatistics() {
            return {
                total: tasks.length,
                pending: tasks.filter(t => t.status === 'todo').length,
                inProgress: tasks.filter(t => t.status === 'in-progress').length,
                completed: tasks.filter(t => t.status === 'completed').length,
                highPriority: tasks.filter(t => t.priority === 'high').length,
                urgent: tasks.filter(t => t.category === 'urgent').length,
                daily: tasks.filter(t => t.category === 'daily').length,
                weekly: tasks.filter(t => t.category === 'weekly').length,
                monthly: tasks.filter(t => t.category === 'monthly').length
            };
        }

        // Initialize
        renderTasks();
    </script>
</body>
</html>
